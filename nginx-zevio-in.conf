# =============================================================
# Nginx Configuration for Zevio.in
# Domains:
#   zevio.in       -> Next.js user app     (port 8000)
#   admin.zevio.in -> Vite admin/vendor     (static files)
#   api.zevio.in   -> Express backend       (port 5000)
# =============================================================

# -- zevio.in -> Next.js (port 8000) --
server {
    server_name zevio.in www.zevio.in;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /_next/static/ {
        alias /var/www/zevio/nextjs/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        alias /var/www/zevio/nextjs/public/favicon.ico;
    }

    location /public/ {
        alias /var/www/zevio/nextjs/public/;
    }

    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/zevio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zevio.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# -- admin.zevio.in -> Vite React (static files) --
server {
    server_name admin.zevio.in;

    root /var/www/zevio/frontend/dist;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/zevio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zevio.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# -- api.zevio.in -> Express backend (port 5000) --
server {
    server_name api.zevio.in;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/zevio.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zevio.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# -- HTTP -> HTTPS redirects --
server {
    listen 80;
    server_name zevio.in www.zevio.in;
    return 301 https://$host$request_uri;
}
server {
    listen 80;
    server_name admin.zevio.in;
    return 301 https://$host$request_uri;
}
server {
    listen 80;
    server_name api.zevio.in;
    return 301 https://$host$request_uri;
}
