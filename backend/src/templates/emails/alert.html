<!--
  ALERT EMAIL TEMPLATE
  ─────────────────────
  Sent via: alerts@notify.zevio.in
  Used for: Status changes, approvals/rejections, urgent updates, reminders.

  Placeholders:
    {{TITLE}}           – Alert title
    {{MESSAGE}}         – Main alert body
    {{ALERT_TYPE}}      – "success" | "warning" | "danger" | "info"
    {{CTA_URL}}         – Action button URL (optional)
    {{CTA_TEXT}}        – Button label (optional)
    {{DETAILS_HTML}}    – Extra detail rows (optional)
    {{RECIPIENT_NAME}} – Greeting name
-->

<div style="border-left: 4px solid {{ALERT_COLOR}}; padding-left: 16px; margin-bottom: 16px;">
  <h2 style="margin: 0 0 4px;">{{TITLE}}</h2>
</div>

<p>Hi {{RECIPIENT_NAME}},</p>

<p>{{MESSAGE}}</p>

{{DETAILS_HTML}}

{{CTA_HTML}}

<p style="font-size: 13px; color: #6b7280; margin-top: 24px;">
  Need help? Contact us at <a href="mailto:hello@zevio.in">hello@zevio.in</a>.
</p>
