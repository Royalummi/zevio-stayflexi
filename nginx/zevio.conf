# =============================================================
# Nginx Configuration for Zevio
# File: /etc/nginx/sites-available/zevio
# Domains:
#   zevio.cloud       → Next.js user app     (port 8000)
#   admin.zevio.cloud → Vite admin/vendor     (static files)
#   api.zevio.cloud   → Express backend      (port 5000)
# =============================================================
# After placing this file, run:
#   sudo ln -s /etc/nginx/sites-available/zevio /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then get SSL:
#   sudo certbot --nginx -d zevio.cloud -d www.zevio.cloud -d admin.zevio.cloud -d api.zevio.cloud
# =============================================================

# ── zevio.cloud → Next.js (port 8000) ────────────────────
server {
    listen 80;
    server_name zevio.cloud www.zevio.cloud;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Next.js static files (served directly for speed)
    location /_next/static/ {
        alias /var/www/zevio/nextjs/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        alias /var/www/zevio/nextjs/public/favicon.ico;
    }

    location /public/ {
        alias /var/www/zevio/nextjs/public/;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── admin.zevio.cloud → Vite React (static files) ────────
server {
    listen 80;
    server_name admin.zevio.cloud;

    root /var/www/zevio/frontend/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA routing (all routes → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── api.zevio.cloud → Express backend (port 5000) ────────
server {
    listen 80;
    server_name api.zevio.cloud;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # File upload size (match your MAX_FILE_SIZE env var ~5MB + buffer)
    client_max_body_size 20M;

    # API proxy
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
